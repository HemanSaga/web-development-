<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Leaf & Lore — Home</title>
<style>
:root{
--bg:#0f1724; --card:#0b1220; --accent:#f6c26b; --muted:#9aa4b2; --glass: rgba(255,255,255,0.04);
--radius:14px; font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#071028 0%, #0f1724 100%);color:#e6eef6;line-height:1.45}


header{display:flex;align-items:center;justify-content:space-between;padding:20px 36px;backdrop-filter: blur(6px)}
.brand{display:flex;gap:14px;align-items:center}
.logo{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ff8da1);display:flex;align-items:center;justify-content:center;font-weight:800;color:#102;box-shadow:0 6px 20px rgba(0,0,0,0.5)}
nav a{color:var(--muted);text-decoration:none;margin-left:18px;font-weight:600}
nav a:hover{color:var(--accent)}


.hero{display:grid;grid-template-columns:1fr 420px;gap:28px;padding:48px 36px;align-items:center}
.hero-left h1{font-size:38px;margin:0 0 12px;color:#fff}
.hero-left p{color:var(--muted);margin:0 0 20px}
.cta{display:inline-block;padding:12px 18px;border-radius:12px;background:linear-gradient(90deg,var(--accent),#ff8da1);color:#071022;text-decoration:none;font-weight:700}


.search-card{background:var(--card);padding:18px;border-radius:14px;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
.search-card input, .search-card select{width:100%;padding:12px;margin:8px 0;border-radius:10px;background:var(--glass);border:1px solid rgba(255,255,255,0.04);color:inherit}


.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;padding:24px 36px}
.book{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.03);}
.book img{width:100%;border-radius:8px;height:220px;object-fit:cover}
.book h3{margin:10px 0 6px;font-size:16px}
.book p{margin:0;color:var(--muted);font-size:13px}


footer{padding:28px 36px;border-top:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;color:var(--muted)}


/* responsive */
@media (max-width:880px){
.hero{grid-template-columns:1fr; padding:28px 20px}
header{padding:14px 20px}
.grid{padding:18px 20px}
}
</style>
</head>
<body>
<header>
<div class="brand">
<div class="logo">L&L</div>
<div>
<div style="font-weight:700">Leaf & Lore</div>
<div style="font-size:12px;color:var(--muted)">Handpicked books & cozy reading</div>
</div>
</div>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="profile.html">Profile</a>
<a href="contact.html">Contact</a>
</nav>
</header>


</html>
